<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Rating Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Employee Rating Dashboard</h1>
        <p class="subtitle">Управление филиалами, сотрудниками и оценками</p>
      </div>

      <div class="topbar-actions">
        <div class="api-config">
          <label for="apiBaseUrl">API URL</label>
          <input id="apiBaseUrl" type="text" value="http://127.0.0.1:8001" />
          <button id="saveApiUrlBtn" type="button">Сохранить</button>
        </div>

        <div class="token-block">
          <label for="tokenInput">Access Token</label>
          <input id="tokenInput" type="text" placeholder="JWT token" />
          <button id="saveTokenBtn" type="button">Сохранить токен</button>
          <button id="logoutBtn" type="button" class="ghost">Выход</button>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="status-grid">
        <article class="stat-card">
          <span class="stat-title">Филиалы</span>
          <strong id="branchesCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-title">Сотрудники</span>
          <strong id="employeesCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-title">Оценки по сотруднику</span>
          <strong id="gradesCount">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-title">Рейтинг записей</span>
          <strong id="ratingsCount">0</strong>
        </article>
      </section>

      <section class="grid two-col">
        <article class="card">
          <h2>Авторизация</h2>
          <div class="split-forms">
            <form id="registerForm" class="form">
              <h3>Регистрация</h3>
              <input name="email" type="email" placeholder="Email" required />
              <input
                name="password"
                type="password"
                placeholder="Пароль"
                required
              />
              <select name="role" required>
                <option value="MANAGER">MANAGER</option>
                <option value="ADMIN">ADMIN</option>
              </select>
              <input
                name="branch_id"
                type="number"
                placeholder="ID филиала"
                min="1"
                required
              />
              <button type="submit">Зарегистрировать</button>
            </form>

            <form id="loginForm" class="form">
              <h3>Логин</h3>
              <input name="username" type="email" placeholder="Email" required />
              <input
                name="password"
                type="password"
                placeholder="Пароль"
                required
              />
              <button type="submit">Войти</button>
            </form>
          </div>
        </article>

        <article class="card">
          <h2>Филиалы</h2>
          <form id="createBranchForm" class="form-inline">
            <input
              name="name"
              type="text"
              placeholder="Название филиала"
              required
            />
            <button type="submit">Создать</button>
            <button id="loadBranchesBtn" type="button" class="ghost">
              Обновить
            </button>
          </form>
          <div id="branchesOutput" class="table-wrap"></div>
        </article>
      </section>

      <section class="grid two-col">
        <article class="card">
          <h2>Сотрудники</h2>
          <form id="createEmployeeForm" class="form-inline">
            <input name="name" type="text" placeholder="Имя сотрудника" required />
            <input
              name="branch_id"
              type="number"
              placeholder="ID филиала"
              min="1"
              required
            />
            <button type="submit">Создать</button>
            <button id="loadEmployeesBtn" type="button" class="ghost">
              Обновить
            </button>
          </form>
          <div id="employeesOutput" class="table-wrap"></div>
        </article>

        <article class="card">
          <h2>Оценки</h2>
          <form id="createGradeForm" class="form-grid compact">
            <input
              name="employee_id"
              type="number"
              placeholder="ID сотрудника"
              min="1"
              required
            />
            <input
              name="value"
              type="number"
              placeholder="Оценка 1-100"
              min="1"
              max="100"
              required
            />
            <input
              name="role_in_shift"
              type="text"
              placeholder="Роль в смене"
              required
            />
            <input name="comment" type="text" placeholder="Комментарий" />
            <button type="submit">Добавить оценку</button>
          </form>

          <form id="gradesByEmployeeForm" class="form-inline">
            <input
              name="employee_id"
              type="number"
              placeholder="ID сотрудника"
              min="1"
              required
            />
            <button type="submit">Показать оценки</button>
          </form>
          <div id="gradesOutput" class="table-wrap"></div>
        </article>
      </section>

      <section class="card">
        <h2>Рейтинги</h2>
        <div class="form-row">
          <form id="branchRatingsForm" class="form-inline">
            <input
              name="branch_id"
              type="number"
              placeholder="ID филиала"
              min="1"
              required
            />
            <button type="submit">Рейтинг филиала</button>
          </form>

          <button id="allRatingsBtn" type="button">Рейтинг всех (ADMIN)</button>

          <form id="topRatingsForm" class="form-inline">
            <input
              name="top_n"
              type="number"
              placeholder="Top N"
              min="1"
              value="10"
              required
            />
            <button type="submit">Топ сотрудников</button>
          </form>
        </div>
        <div id="ratingsOutput" class="table-wrap"></div>
      </section>

      <aside class="card">
        <h2>События</h2>
        <div id="toast" class="toast hidden"></div>
        <ul id="logOutput" class="log-list"></ul>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
